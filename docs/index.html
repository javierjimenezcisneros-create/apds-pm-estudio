<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APDS · PM Estudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#F4F1EC;--paper2:#EDE8E0;--surface:#FFF;
  --ink:#1A1410;--ink2:#5C5248;--ink3:#9C9088;--line:#DDD6CC;
  --burg:#3C1F21;--burg2:#5A3134;--burg3:#7A4548;
  --cop:#C26942;--cop2:#D4845A;--cop3:rgba(194,105,66,.15);
  --viv:#3D6491;--viv-t:#E4ECF5;
  --hot:#436B3A;--hot-t:#E3EDE0;
  --rest:#B35D30;--rest-t:#F5E4D8;
  --crit:#A82E2E;--crit-t:#F4DEDE;
  --alto:#B86328;--alto-t:#F4E4D6;
  --med:#967A1E;--med-t:#F0EAD2;
  --baj:#4E7A42;--baj-t:#DFF0D8;
  --vac:#7A736B;--vac-t:#EDEAE5;
  --ph1:#8A96BB;--ph2:#C0825A;--ph3:#C8A84E;
  --ph4:#6A9E90;--ph5:#7AA4CC;--ph6:#72A86C;
  --ph7:#B87EA8;--ph8:#B84040;--ph9:#C4BDB4;
  --r:3px;--f:'Inter','Helvetica Neue',Arial,sans-serif;
}
html,body{background:var(--paper);color:var(--ink);font-family:var(--f);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--burg);gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-name{font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--cop);line-height:1.4;}
.brand-name span{display:block;}
.brand-div{width:1px;height:26px;background:var(--burg3);}
.brand-sub{font-size:10px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;color:rgba(194,105,66,.6);}
.week-badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--cop);border:1px solid var(--burg3);padding:4px 10px;border-radius:2px;}
.update-badge{font-size:10px;color:rgba(194,105,66,.45);letter-spacing:.04em;}
.tabs{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--line);padding:0 16px;flex-wrap:nowrap;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-size:10.5px;font-weight:400;letter-spacing:.06em;text-transform:uppercase;padding:11px 15px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--ink3);cursor:pointer;white-space:nowrap;transition:.15s;margin-bottom:-1px;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--burg);border-bottom-color:var(--cop);font-weight:500;}
.tab.tab-master{color:var(--cop2);}
.tab.tab-master.active{color:var(--burg);}
.app{max-width:960px;margin:0 auto;padding:0 18px 60px;}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:24px 0 20px;padding-bottom:14px;border-bottom:1px solid var(--line);}
.view-title{font-size:20px;font-weight:300;letter-spacing:.06em;text-transform:uppercase;color:var(--burg);}
.view-sub{font-size:10.5px;font-weight:300;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-top:4px;}
.view-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.panel{margin-bottom:22px;}
.panel-head{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.eyebrow{font-size:10px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.eyebrow::after{content:'';display:inline-block;height:1px;width:50px;background:var(--line);margin-left:10px;vertical-align:middle;}
.panel-note{font-size:11px;color:var(--ink3);}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;padding:2px 6px;border-radius:2px;white-space:nowrap;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tag-viv{background:var(--viv-t);color:var(--viv);}.tag-viv .dot{background:var(--viv);}
.tag-hot{background:var(--hot-t);color:var(--hot);}.tag-hot .dot{background:var(--hot);}
.tag-rest{background:var(--rest-t);color:var(--rest);}.tag-rest .dot{background:var(--rest);}
.tag-crit{background:var(--crit-t);color:var(--crit);}.tag-crit .dot{background:var(--crit);}
.tag-alto{background:var(--alto-t);color:var(--alto);}.tag-alto .dot{background:var(--alto);}
.tag-med{background:var(--med-t);color:var(--med);}.tag-med .dot{background:var(--med);}
.tag-baj{background:var(--baj-t);color:var(--baj);}.tag-baj .dot{background:var(--baj);}
.tag-vac{background:var(--vac-t);color:var(--vac);}.tag-vac .dot{background:var(--vac);}
.tag-out{background:transparent;border:1px solid var(--line);color:var(--ink3);}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{font-size:9.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);padding:6px 9px;border-bottom:1px solid var(--line);background:var(--paper);text-align:left;white-space:nowrap;}
.tbl td{padding:7px 9px;border-bottom:1px solid var(--paper2);vertical-align:top;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(194,105,66,.04);}
.tbl th:first-child,.tbl td:first-child{padding-left:12px;}
.focus-list{display:flex;flex-direction:column;gap:5px;}
.focus-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);}
.focus-item input[type=checkbox]{margin-top:2px;width:14px;height:14px;accent-color:var(--burg);cursor:pointer;flex-shrink:0;}
.focus-text{flex:1;font-size:12.5px;}
.focus-item.done .focus-text{color:var(--ink3);text-decoration:line-through;}
.agenda-box{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);padding:2px 12px;}
.agenda-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--paper2);font-size:12.5px;}
.agenda-row:last-child{border-bottom:none;}
.agenda-when{font-size:10px;font-weight:500;letter-spacing:.04em;color:var(--cop);width:82px;flex-shrink:0;padding-top:1px;}
.gantt{margin-top:10px;}
.gantt-months-row{display:grid;grid-template-columns:repeat(20,1fr);gap:1px;margin-bottom:2px;}
.gantt-month{font-size:8px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);padding-left:2px;}
.gantt-row{position:relative;margin-bottom:2px;}
.gantt-grid{display:grid;grid-template-columns:repeat(20,1fr);gap:1px;}
.gantt-cell{height:24px;background:var(--paper2);border-radius:1px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.gantt-cell.filled{cursor:pointer;}
.gantt-cell.filled:hover{filter:brightness(1.08);}
.gantt-lbl{font-size:7px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.85);padding:0 2px;text-align:center;pointer-events:none;line-height:1;}
.gantt-cell.ph1 .gantt-lbl,.gantt-cell.ph9 .gantt-lbl{color:rgba(30,24,20,.5);}
.gantt-arrow{position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:5px solid rgba(0,0,0,.2);z-index:2;pointer-events:none;}
.gantt-today{position:absolute;top:-16px;bottom:0;width:2px;background:var(--burg);opacity:.65;pointer-events:none;z-index:3;}
.gantt-today-lbl{position:absolute;top:-15px;left:3px;font-size:7.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--burg);}
.gantt-weeks-row{display:grid;grid-template-columns:repeat(20,1fr);gap:1px;margin-top:2px;}
.gantt-week{font-size:7px;color:var(--ink3);padding-left:2px;overflow:hidden;white-space:nowrap;}
.gantt-cell.has-note::after{content:'';position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:var(--cop);}
.ph1{background:var(--ph1);}.ph2{background:var(--ph2);}.ph3{background:var(--ph3);}
.ph4{background:var(--ph4);}.ph5{background:var(--ph5);}.ph6{background:var(--ph6);}
.ph7{background:var(--ph7);}.ph8{background:var(--ph8);}.ph9{background:var(--ph9);}
.proj-card{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);padding:12px 14px;margin-bottom:9px;}
.proj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.proj-name{font-size:13.5px;font-weight:500;}
.proj-tags{display:flex;gap:4px;flex-wrap:wrap;}
.proj-meta{display:grid;grid-template-columns:80px 1fr;gap:2px 6px;font-size:11.5px;color:var(--ink2);margin:6px 0;}
.proj-meta .k{font-size:9.5px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);padding-top:1px;}
.hito-row{font-size:12.5px;font-weight:500;margin-bottom:6px;}
.note-area{margin-top:8px;}
.note-area label{font-size:9px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:3px;}
.note-area textarea{width:100%;min-height:36px;resize:vertical;font-family:var(--f);font-size:12px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:6px 9px;line-height:1.5;}
.note-area textarea:focus{outline:none;border-color:var(--cop);}
.carga-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:7px;}
.carga-card{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);padding:9px 11px;}
.carga-card.vac{background:var(--vac-t);border-color:var(--vac);}
.carga-name{font-weight:500;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;gap:5px;margin-bottom:3px;}
.carga-projs{font-size:11px;color:var(--ink3);}
details.collapse{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);overflow:hidden;margin-bottom:5px;}
details.collapse summary{cursor:pointer;padding:10px 12px;font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);list-style:none;display:flex;align-items:center;gap:7px;}
details.collapse summary::before{content:'+';font-size:13px;color:var(--cop);width:11px;}
details.collapse[open] summary::before{content:'–';}
details.collapse .inner{padding:0 12px 12px;}
.challan-form{display:grid;gap:7px;}
.challan-form select,.challan-form input,.challan-form textarea{font-family:var(--f);font-size:12.5px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:7px 9px;width:100%;}
.challan-form select:focus,.challan-form input:focus,.challan-form textarea:focus{outline:none;border-color:var(--cop);}
.challan-form label{font-size:9.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:2px;}
.btn-cop{font-family:var(--f);font-size:10.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;border-radius:2px;cursor:pointer;border:none;background:var(--burg);color:var(--cop);}
.btn-cop:hover{background:var(--burg2);}
.btn-ghost{font-family:var(--f);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:2px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--ink3);}
.btn-ghost:hover{border-color:var(--cop);color:var(--cop);}
.btn-danger{font-family:var(--f);font-size:10.5px;padding:6px 12px;border-radius:2px;cursor:pointer;border:1px solid var(--crit-t);background:transparent;color:var(--crit);}
.modal-bg{position:fixed;inset:0;background:rgba(26,20,16,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border-radius:4px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(26,20,16,.22);overflow:hidden;}
.modal-head{background:var(--burg);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--cop);}
.modal-sub{font-size:9.5px;font-weight:300;color:rgba(194,105,66,.6);margin-top:1px;}
.modal-close{background:none;border:none;color:rgba(194,105,66,.6);font-size:19px;cursor:pointer;padding:0;line-height:1;}
.modal-close:hover{color:var(--cop);}
.modal-body{padding:16px;}
.modal-body textarea{width:100%;min-height:80px;resize:vertical;font-family:var(--f);font-size:12.5px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:9px 11px;line-height:1.5;}
.modal-body textarea:focus{outline:none;border-color:var(--cop);}
.modal-foot{padding:11px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:7px;align-items:center;}
.prox-card{margin-bottom:7px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
.prox-head{background:var(--burg);color:var(--cop);font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:6px 11px;}
.prox-body{padding:9px 11px;background:var(--surface);}
.prox-item{font-size:12.5px;color:var(--ink2);padding:2px 0;border-bottom:1px solid var(--paper2);}
.prox-item:last-child{border-bottom:none;}
.prox-item.alert{color:var(--crit);}
.prox-item.warn{color:var(--alto);}
.foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-top:30px;padding:14px 18px;border-top:1px solid var(--line);font-size:10.5px;font-weight:300;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);max-width:960px;margin-left:auto;margin-right:auto;}
.sync{display:flex;align-items:center;gap:5px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--baj);}
.sync.saving .sync-dot{background:var(--med);}
.sync.error .sync-dot{background:var(--crit);}
.alert-row{display:flex;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);margin-bottom:5px;align-items:flex-start;}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-name"><span>Alejandra Pombo</span><span>Design Studio</span></span>
    <span class="brand-div"></span>
    <span class="brand-sub">PM Estudio</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="update-badge" id="update-badge"></span>
    <span class="week-badge" id="week-badge"></span>
  </div>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="app"><main id="view"></main></div>
<div class="foot">
  <span class="sync" id="sync"><span class="sync-dot"></span>Sincronizado</span>
  <button class="btn-ghost" id="export-btn">Exportar estado</button>
</div>
<script>

function pCls(p){if(!p)return"";const u=p.toUpperCase();if(u.includes("MONTAJE")||u.includes("VISITA"))return"ph4";if(u.includes("OBRA")||u.includes("EJECUCION")||u.includes("EMPIEZA")||u.includes("INICIO"))return"ph2";if(u.includes("PEDIDO")||u.includes("CERRAR DECO")||u.includes("TECHOS")||u.includes("CARPINT"))return"ph3";if(u.includes("ENTREGA")||u.includes("FIN OBRA")||u.includes("CIERRE"))return"ph6";if(u.includes("RENDERS")||u.includes("RENDER")||u.includes("DECO")&&!u.includes("INICIO"))return"ph7";if(u.includes("PARADO")||u.includes("PENDIENTE")||u.includes("LICENCIA")||u.includes("REPLANTEO"))return"ph9";if(u.includes("PROYECTO")||u.includes("PROY")||u.includes("BASICO")||u.includes("PRESUPUESTO")||u.includes("REUNION")||u.includes("REUNIÓN")||u.includes("IDEAS")||u.includes("MARKETING")||u.includes("FEEDBACK")||u.includes("EMPEZAR"))return"ph1";return"ph5";}

function alertRow(a){return`<div class="alert-row"><span style="flex-shrink:0;margin-top:1px;">${tagR(a.risk)}</span><div style="flex:1;min-width:0;"><span style="font-weight:600;font-size:12.5px;">${a.proj}</span><span style="font-size:10.5px;color:var(--ink3);margin-left:5px;">${a.dept}·${a.resp}</span><div style="font-size:12.5px;color:var(--ink2);margin-top:1px;">${a.text}</div></div><div style="font-size:10.5px;color:var(--ink3);white-space:nowrap;flex-shrink:0;padding-top:1px;">${a.fecha}</div></div>`;}
function gantt(proj,pid){const tl=proj.tl||{};const slug=proj.slug||(proj.nombre||"").replace(/\s+/g,"_").toLowerCase();const st=S._c[pid]||{check:{},notes:{}};let mH="";MONTHS.forEach(([m,s,e])=>{mH+=`<div class="gantt-month" style="grid-column:span ${e-s+1}">${m}</div>`;});const filled=MONTHS.reduce((a,[,s,e])=>a+(e-s+1),0);if(filled<20)mH+=`<div class="gantt-month" style="grid-column:span ${20-filled}"></div>`;let cells="";const phases=Array.from({length:20},(_,i)=>tl[i]||null);for(let i=0;i<20;i++){const ph=phases[i];const nph=phases[i+1];const cls=ph?`gantt-cell filled ${pCls(ph)}`:"gantt-cell";const nk=`cn:${slug}:${i}`;const hn=!!(st.notes&&st.notes[nk]);const arrow=ph&&nph&&pCls(ph)!==pCls(nph)?'<span class="gantt-arrow"></span>':"";const lbl=ph?`<span class="gantt-lbl">${pShort(ph)}</span>`:"";cells+=ph?`<div class="${cls}${hn?" has-note":""}" title="${ph}·sem ${WEEK_LABELS[i]}" data-slug="${slug}" data-week="${i}" data-phase="${ph}" data-person="${pid}" data-nk="${nk}">${lbl}${arrow}</div>`:`<div class="${cls}" title="Sem ${WEEK_LABELS[i]}"></div>`;}
const wH=WEEK_LABELS.map(w=>`<div class="gantt-week">${w}</div>`).join("");const tp=(TODAY_WEEK/20*100).toFixed(2);return`<div class="gantt"><div class="gantt-months-row">${mH}</div><div class="gantt-row"><div class="gantt-today" style="left:${tp}%"></div><div class="gantt-today-lbl" style="left:calc(${tp}% + 3px)">HOY</div><div class="gantt-grid">${cells}</div></div><div class="gantt-weeks-row">${wH}</div></div>`;}
function openModal(slug,wi,ph,pid,nk){const st=S._c[pid]||{check:{},notes:{}};const ex=st.notes?.[nk]||"";const wl=WEEK_LABELS[wi]||wi;const bd=document.createElement("div");bd.className="modal-bg";bd.id="cm-bg";bd.innerHTML=`<div class="modal"><div class="modal-head"><div><div class="modal-title">${slug.replace(/_/g," ").toUpperCase()}·${wl}</div><div class="modal-sub">${ph}</div></div><button class="modal-close" id="mc">×</button></div><div class="modal-body"><textarea id="m-ta" placeholder="Comentario para esta semana…">${ex}</textarea></div><div class="modal-foot">${ex?'<button class="btn-danger" id="m-del" style="margin-right:auto;">Borrar</button>':""}<button class="btn-ghost" id="m-can">Cancelar</button><button class="btn-cop" id="m-sav">Guardar</button></div></div>`;document.body.appendChild(bd);bd.addEventListener("click",e=>{if(e.target===bd)clModal();});document.getElementById("mc").onclick=clModal;document.getElementById("m-can").onclick=clModal;document.getElementById("m-sav").onclick=()=>{const v=document.getElementById("m-ta").value.trim();S.setNote(pid,nk,v);const c=document.querySelector(`[data-nk="${nk}"]`);if(c){v?c.classList.add("has-note"):c.classList.remove("has-note");}clModal();};const db=document.getElementById("m-del");if(db)db.onclick=()=>{S.setNote(pid,nk,"");const c=document.querySelector(`[data-nk="${nk}"]`);if(c)c.classList.remove("has-note");clModal();};document.getElementById("m-ta").focus();}
function clModal(){const el=document.getElementById("cm-bg");if(el)el.remove();}
function projCard(proj,pid){const st=S._c[pid]||{check:{},notes:{}};const slug=proj.slug||(proj.nombre||"").replace(/\s+/g,"_").toLowerCase();const note=st.notes?.["note:"+slug]||"";const hasTl=proj.tl&&Object.keys(proj.tl).length>0;return`<div class="proj-card"><div class="proj-top"><div class="proj-name">${proj.nombre}</div><div class="proj-tags">${proj.riesgo||proj.intensidad?tagR(proj.riesgo||proj.intensidad):""}${proj.estado?`<span class="tag tag-out">${proj.estado}</span>`:""}</div></div>${proj.hito?`<div class="hito-row">${proj.hito}</div>`:""}`+(proj.obs?`<div style="font-size:11.5px;color:var(--ink3);margin-bottom:5px;">${proj.obs}</div>`:"")+`${proj.resp?`<div class="proj-meta"><span class="k">Equipo</span><span>${proj.resp}</span></div>`:""}`+(hasTl?gantt({...proj,slug},pid):"")+`<div class="note-area" style="margin-top:${hasTl?"9px":"7px"}"><label>Nota</label><textarea data-note="${slug}" data-person="${pid}" placeholder="Añadir nota…">${note}</textarea></div></div>`;}
function focusItem(text,id,pid){const st=S._c[pid]||{check:{},notes:{}};const done=!!(st.check?.[id]);return`<div class="focus-item${done?" done":"'}"><input type="checkbox" data-check="${id}" data-person="${pid}" ${done?"checked":""}><span class="focus-text">${text}</span></div>`;}
function challanSec(filterProjs){const rows=filterProjs?CHALLAN.filter(c=>filterProjs.some(p=>c.proj.toUpperCase().includes(p.toUpperCase().slice(0,6))||p.toUpperCase().includes(c.proj.toUpperCase().slice(0,6)))):CHALLAN;const others=filterProjs?CHALLAN.filter(c=>!rows.includes(c)):[];const tR=list=>list.map(r=>`<tr><td>${tagR(r.riesgo)}</td><td><b>${r.proj}</b><br><span style="font-size:10px;color:var(--ink3);">${r.resp}</span></td><td><span class="tag tag-out">${r.fase}</span></td><td style="font-size:11.5px;">${r.estado}</td><td style="font-size:10.5px;white-space:nowrap;">${r.comprometida}</td><td style="font-size:10.5px;white-space:nowrap;${r.realista.startsWith("⚠")?"color:var(--alto);font-weight:500;":""}">${r.realista}</td><td style="font-size:11.5px;color:var(--ink2);">${r.next}</td></tr>`).join("");const tbl=list=>`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Prio</th><th>Proyecto</th><th>Fase</th><th>Estado</th><th>Comprometida</th><th>Realista</th><th>Próximo paso</th></tr></thead><tbody>${tR(list)}</tbody></table></div>`;return`<div class="panel"><div class="panel-head"><span class="eyebrow">Renders — Challan</span><span class="panel-note">${CHALLAN.length} proyectos en cola</span></div><div style="margin-bottom:9px;padding:7px 11px;background:var(--alto-t);border-radius:var(--r);font-size:11.5px;color:var(--alto);font-weight:500;">${CHALLAN_VAC}</div>${filterProjs&&rows.length?`<div style="font-size:9.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;">Mis proyectos en Challan</div>`:""}`+(filterProjs&&rows.length?tbl(rows):tbl(CHALLAN))+(others.length?`<details class="collapse" style="margin-top:7px;"><summary>Resto de la cola (${others.length} proyectos)</summary><div class="inner">${tbl(others)}</div></details>`:"")
+`<div style="margin-top:9px;padding:11px 13px;background:var(--cop3);border-radius:var(--r);border:1px dashed var(--cop);"><div style="font-size:10px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--cop);margin-bottom:7px;">+ Solicitar render a Challan</div><div class="challan-form"><div><label>Proyecto</label><input id="ch-proj" type="text" placeholder="Nombre del proyecto"></div><div><label>Fase</label><select id="ch-fase"><option>F1 — Volumetría y capturas</option><option>F2 — Materialidad y acabados</option><option>F3 — Render final</option></select></div><div><label>Documentación disponible</label><input id="ch-doc" type="text" placeholder="Planos, 3D, vistas marcadas…"></div><div><label>Fecha comprometida con cliente</label><input id="ch-fecha" type="text" placeholder="ej. 22 jun"></div><div><label>Notas adicionales</label><textarea id="ch-notas" rows="2" style="min-height:0;" placeholder="Contexto, prioridad, solapamientos…"></textarea></div><button class="btn-cop" id="ch-submit">Enviar solicitud al PM</button><div id="ch-msg" style="font-size:11.5px;color:var(--baj);display:none;">✅ Solicitud registrada — el PM la revisará y añadirá a la cola</div></div></div>`
+`<details class="collapse" style="margin-top:7px;"><summary>Flujo Challan · F1 → F2 → F3</summary><div class="inner" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;">${CHALLAN_FLUJO.map(f=>`<div style="background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:9px 11px;"><div style="font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--cop);margin-bottom:3px;">${f.fase}</div><div style="font-size:11.5px;font-weight:500;margin-bottom:3px;">${f.titulo}</div><div style="font-size:11px;color:var(--ink3);line-height:1.5;">${f.desc}</div></div>`).join("")}</div></details>`
+`<details class="collapse" style="margin-top:5px;"><summary>Reglas operativas Challan</summary><div class="inner">${CHALLAN_REGLAS.map((r,i)=>`<div style="font-size:11.5px;color:var(--ink2);padding:4px 0;border-bottom:1px solid var(--paper2);">${i+1}. ${r}</div>`).join("")}</div></details></div>`;}
function renderMaster(){const st=S._c.javi||{check:{},notes:{}};let h="";h+=`<div class="view-head"><div><div class="view-title">Javi · Master</div><div class="view-sub">${WEEK_LABEL}</div></div><div class="view-tags">${tagD("Vivienda")}${tagD("Hoteles")}${tagD("Restaurantes")}</div></div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Alertas de la semana</span><span class="panel-note">${ALERTAS.length} activas</span></div>${ALERTAS.map(alertRow).join("")}</div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Mi foco esta semana</span></div><div class="focus-list">${(FOCO_SEMANA.javi||[]).map((t,i)=>focusItem(t,`javi-f${i}`,"javi")).join("")}</div></div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Esta semana en el estudio</span></div><div class="agenda-box">${AGENDA.map(a=>`<div class="agenda-row"><span class="agenda-when">${a.when}</span><span>${a.text}</span></div>`).join("")}</div></div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Montajes confirmados — julio</span></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Fechas</th><th>Proyecto</th><th>Equipo</th><th>Dpto</th></tr></thead><tbody>${MONTAJES.map(m=>`<tr><td style="font-size:10.5px;white-space:nowrap;">${m.fechas}</td><td><b>${m.proj}</b></td><td>${m.equipo}</td><td>${tagD(m.dept)}</td></tr>`).join("")}</tbody></table></div></div>`;
const cG=PERSON_ORDER.filter(id=>id!=="ale").map(id=>{const isV=(VAC[id]||"").includes("15–19 jun");return`<div class="carga-card${isV?" vac":""}"><div class="carga-name">${NOMBRE_PERSONA[id]}<span class="tag ${isV?"tag-vac":"tag-out"}">${isV?"Vac":"Activo"}</span></div><div class="carga-projs">${(PROJS_PERSONA[id]||[]).slice(0,4).join(" · ")}</div></div>`;}).join("");h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Carga del equipo</span></div><div class="carga-grid">${cG}</div></div>`;
h+=challanSec(null);
h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Master global de proyectos</span><span class="panel-note">${MASTER.length} proyectos</span></div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;align-items:center;"><input type="text" id="m-search" placeholder="Buscar…" style="font-family:var(--f);font-size:12px;padding:6px 11px;border:1px solid var(--line);border-radius:999px;background:var(--surface);color:var(--ink);min-width:140px;">${["todos","Crítico","Alto","Medio","Bajo"].map(r=>`<button data-frisk="${r}" style="cursor:pointer;font-size:10px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:${filterRisk===r?"var(--burg)":"var(--surface)"};color:${filterRisk===r?"#fff":"var(--ink3)"};">${r}</button>`).join("")}</div><div id="master-tbl"></div></div>`;
const myP=MASTER.filter(p=>(PROJS_PERSONA.javi||[]).some(n=>p.nombre.toUpperCase().includes(n.toUpperCase().slice(0,7))||n.toUpperCase().includes(p.nombre.toUpperCase().slice(0,7))));h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Mis proyectos</span></div>${myP.map(p=>projCard({...p,slug:p.nombre.replace(/\s+/g,"_").toLowerCase()},"javi")).join("")}</div>`;return h;}
function renderMasterTable(){const q=filterSearch.toLowerCase();const rows=MASTER.filter(p=>{if(filterRisk!=="todos"){const rl=rLbl(p.riesgo);if(filterRisk==="Crítico"&&!rl.includes("tico"))return false;if(filterRisk==="Alto"&&rl!=="Alto")return false;if(filterRisk==="Medio"&&rl!=="Medio")return false;if(filterRisk==="Bajo"&&rl!=="Bajo")return false;}if(q&&!`${p.nombre} ${p.resp} ${p.estado} ${p.hito} ${p.obs}`.toLowerCase().includes(q))return false;return true;});const el=document.getElementById("master-tbl");if(!el)return;el.innerHTML=`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Proyecto</th><th>Responsable</th><th>Estado</th><th>Próximo hito</th><th>Riesgo</th><th>Obs</th></tr></thead><tbody>${rows.map(p=>`<tr><td><b>${p.nombre}</b></td><td style="font-size:11.5px;">${p.resp}</td><td>${p.estado}</td><td style="font-size:11.5px;">${p.hito}</td><td>${tagR(p.riesgo)}</td><td style="font-size:11.5px;color:var(--ink3);">${p.obs}</td></tr>`).join("")}</tbody></table></div><div style="font-size:10.5px;color:var(--ink3);margin-top:5px;">${rows.length} de ${MASTER.length} proyectos</div>`;}
function renderAle(){let h="";h+=`<div class="view-head"><div><div class="view-title">Alejandra · CEO</div><div class="view-sub">${WEEK_LABEL} · Resumen ejecutivo</div></div><div class="view-tags"><span class="tag tag-vac"><span class="dot"></span>Vacaciones 15–19 jun</span></div></div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Alertas — dónde puedes necesitar intervenir</span></div>${ALERTAS.map(alertRow).join("")}</div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Esta semana en el estudio</span></div><div class="agenda-box">${AGENDA.map(a=>`<div class="agenda-row"><span class="agenda-when">${a.when}</span><span>${a.text}</span></div>`).join("")}</div></div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Tu presencia comprometida</span></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Fecha</th><th>Compromiso</th></tr></thead><tbody>${PRESENCIA_ALE.map(p=>`<tr><td style="font-size:10.5px;white-space:nowrap;font-weight:500;color:var(--cop);">${p.fecha}</td><td>${p.texto}</td></tr>`).join("")}</tbody></table></div></div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Próximas semanas — tener en cuenta</span></div>${PROXIMAS.map(s=>`<div class="prox-card"><div class="prox-head">${s.sem}</div><div class="prox-body">${s.items.map(i=>`<div class="prox-item${i.startsWith("🚨")?" alert":i.includes("sin resolver")||i.includes("⚠")?" warn":""}">${i}</div>`).join("")}</div></div>`).join("")}</div>`;h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Montajes confirmados — julio</span></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Fechas</th><th>Proyecto</th><th>Equipo</th><th>Dpto</th></tr></thead><tbody>${MONTAJES.map(m=>`<tr><td style="font-size:10.5px;white-space:nowrap;">${m.fechas}</td><td><b>${m.proj}</b></td><td>${m.equipo}</td><td>${tagD(m.dept)}</td></tr>`).join("")}</tbody></table></div></div>`;h+=challanSec(null);return h;}
function renderPersonal(pid){const nombre=NOMBRE_PERSONA[pid]||pid;const dept=DEPT_PERSONA[pid]||"";const foco=FOCO_SEMANA[pid]||[];const pN=PROJS_PERSONA[pid]||[];const isV=(VAC[pid]||"").includes("15–19 jun");let h="";h+=`<div class="view-head"><div><div class="view-title">${nombre}</div><div class="view-sub">${WEEK_LABEL}</div></div><div class="view-tags">${dept&&dept!=="todos"?tagD(dept):""}${isV?'<span class="tag tag-vac"><span class="dot"></span>Vacaciones</span>':""}</div></div>`;if(foco.length)h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Foco esta semana</span></div><div class="focus-list">${foco.map((t,i)=>focusItem(t,`${pid}-f${i}`,pid)).join("")}</div></div>`;const mA=ALERTAS.filter(a=>{const tx=`${a.resp} ${a.proj} ${a.text}`.toLowerCase();return tx.includes(nombre.toLowerCase())||pN.some(p=>tx.includes(p.toLowerCase().slice(0,6)));});if(mA.length)h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Alertas relevantes</span></div>${mA.map(alertRow).join("")}</div>`;const mP=MASTER.filter(p=>pN.some(n=>p.nombre.toUpperCase().includes(n.toUpperCase().slice(0,7))||n.toUpperCase().includes(p.nombre.toUpperCase().slice(0,7))));if(mP.length)h+=`<div class="panel"><div class="panel-head"><span class="eyebrow">Mis proyectos</span><span class="panel-note">${mP.length} activos</span></div>${mP.map(p=>projCard({...p,slug:p.nombre.replace(/\s+/g,"_").toLowerCase()},pid)).join("")}</div>`;h+=challanSec(pN);return h;}
function render(){const tL={"javi":"Javi · Master","ale":"Alejandra · CEO"};document.getElementById("tabs").innerHTML=PERSON_ORDER.map(id=>`<button class="tab${id===curPerson?" active":""}${id==="javi"?" tab-master":""}" data-tab="${id}">${tL[id]||NOMBRE_PERSONA[id]}</button>`).join("");document.getElementById("week-badge").textContent=WEEK_STAMP;document.getElementById("update-badge").textContent=UPDATED;const view=document.getElementById("view");if(curPerson==="javi"){filterRisk="todos";filterSearch="";view.innerHTML=renderMaster();renderMasterTable();}else if(curPerson==="ale"){view.innerHTML=renderAle();}else{view.innerHTML=renderPersonal(curPerson);}wireEvents();}
function wireEvents(){document.querySelectorAll("[data-tab]").forEach(el=>{el.addEventListener("click",async()=>{curPerson=el.dataset.tab;await S.load(curPerson);render();});});document.querySelectorAll("[data-check]").forEach(el=>{el.addEventListener("change",()=>{S.setCheck(el.dataset.person,el.dataset.check,el.checked);el.closest(".focus-item").classList.toggle("done",el.checked);});});document.querySelectorAll("[data-note]").forEach(el=>{el.addEventListener("change",()=>{S.setNote(el.dataset.person,"note:"+el.dataset.note,el.value);});});document.querySelectorAll("[data-nk]").forEach(el=>{el.addEventListener("click",()=>{openModal(el.dataset.slug,parseInt(el.dataset.week),el.dataset.phase,el.dataset.person,el.dataset.nk);});const st=S._c[el.dataset.person]||{check:{},notes:{}};if(st.notes?.[el.dataset.nk])el.classList.add("has-note");});document.querySelectorAll("[data-frisk]").forEach(el=>{el.addEventListener("click",()=>{filterRisk=el.dataset.frisk;renderMasterTable();});});const ms=document.getElementById("m-search");if(ms)ms.addEventListener("input",()=>{filterSearch=ms.value;renderMasterTable();});const chB=document.getElementById("ch-submit");if(chB)chB.addEventListener("click",()=>{const proj=document.getElementById("ch-proj")?.value?.trim();if(!proj){alert("Indica el nombre del proyecto");return;}const key=`challan-req:${Date.now()}`;const data={proj,fase:document.getElementById("ch-fase")?.value,doc:document.getElementById("ch-doc")?.value,fecha:document.getElementById("ch-fecha")?.value,notas:document.getElementById("ch-notas")?.value,quien:NOMBRE_PERSONA[curPerson],cuando:new Date().toLocaleString("es-ES")};S.setNote("javi",key,JSON.stringify(data));document.getElementById("ch-msg").style.display="block";["ch-proj","ch-doc","ch-fecha","ch-notas"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});});}
document.getElementById("export-btn").addEventListener("click",async()=>{const out={_exported:new Date().toISOString(),_week:WEEK_LABEL,data:{}};for(const id of PERSON_ORDER){await S.load(id);out.data["s:"+id]=S._c[id];}const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`pm_estado_${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);});
(async function init(){for(const id of PERSON_ORDER)await S.load(id);render();})();
</script>
